name: DB9 Action
description: Create temporary DB9 databases for GitHub Actions.
author: DB9

branding:
  icon: database
  color: blue

inputs:
  mode:
    description: Operation to run. Use database for an empty ephemeral database, branch to clone from an existing database, or cleanup to delete stale CI databases by prefix.
    required: false
    default: database
  database-name:
    description: Name for the DB9 database or branch. Defaults to a generated name based on the workflow run.
    required: false
  database-name-prefix:
    description: Prefix used when generating a database name.
    required: false
    default: gha
  worker-id:
    description: Optional worker or matrix identifier appended to generated database names.
    required: false
  region:
    description: DB9 region to create the database in.
    required: false
  project-id:
    description: DB9 project ID to create the database in.
    required: false
  database-user:
    description: Database user to request in the temporary connection URL.
    required: false
    default: admin
  source-database-id:
    description: Source DB9 database ID for branch mode.
    required: false
  source-database-name:
    description: Source DB9 database name for branch mode. Used only when source-database-id is not set.
    required: false
  snapshot-at:
    description: Optional RFC3339 timestamp for point-in-time branch mode.
    required: false
  wait:
    description: Wait for the created database or branch to become ACTIVE before fetching the connection URL.
    required: false
    default: "true"
  wait-timeout-seconds:
    description: Maximum seconds to wait for a database or branch to become ACTIVE.
    required: false
    default: "120"
  wait-interval-seconds:
    description: Seconds between database status polls while waiting.
    required: false
    default: "2"
  cleanup-prefix:
    description: Database name prefix to delete in cleanup mode.
    required: false
  db9-api-key:
    description: DB9 API key. Omit this input to use anonymous DB9 provisioning.
    required: false
  db9-api-url:
    description: DB9 API base URL.
    required: false
  cleanup:
    description: Delete the created database in the action post step.
    required: false
    default: "true"
  export-env:
    description: Export DATABASE_URL, DB9_DATABASE_URL, and DB9_DATABASE for later steps.
    required: false
    default: "true"

outputs:
  database-url:
    description: Temporary PostgreSQL connection URL for the created DB9 database or branch.
  database-name:
    description: Name of the created DB9 database or branch.
  database-id:
    description: ID of the created DB9 database or branch, when returned by the DB9 API.
  database-user:
    description: Database user used for the temporary connection URL.
  expires-at:
    description: Expiration timestamp for the temporary connection URL, when returned by the DB9 API.
  database-state:
    description: Final state observed for the created DB9 database or branch.
  cleanup-count:
    description: Number of databases deleted in cleanup mode.

runs:
  using: "node24"
  main: "dist/index.js"
  post: "dist/cleanup.js"
  post-if: "always()"
